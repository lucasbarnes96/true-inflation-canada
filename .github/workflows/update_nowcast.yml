name: Update Proxy Nowcast

on:
  schedule:
    - cron: '30 22 * * *' # Run daily at 22:30 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-nowcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Generate Proxy Nowcast Data
        run: python scripts/generate_proxy_nowcast.py
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/latest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): update proxy nowcast and debasement metrics" && git push)
