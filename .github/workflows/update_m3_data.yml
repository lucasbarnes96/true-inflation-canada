name: Update M3 Asset Data

on:
  schedule:
    # Run at 00:00 every Sunday (M3 doesn't update daily, weekly is fine)
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run M3 Data Generation
        run: python scripts/generate_m3_data.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update True Inflation M3 data" && git push)
