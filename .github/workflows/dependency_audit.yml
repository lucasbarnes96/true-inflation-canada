name: Weekly Dependency Audit

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run dependency audit
        id: audit
        run: |
          set +e
          pip-audit -r requirements.lock --format json --output pip-audit.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          set -e

      - name: Publish audit summary
        id: summarize
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          report = Path("pip-audit.json")
          findings = []
          if report.exists():
            payload = json.loads(report.read_text())
            findings = payload.get("dependencies", [])
          vulnerable = []
          for dep in findings:
            vulns = dep.get("vulns", [])
            if vulns:
              vulnerable.append({"name": dep.get("name"), "version": dep.get("version"), "count": len(vulns)})
          total_advisories = sum(item["count"] for item in vulnerable)
          severity = "P2" if vulnerable else "P3"
          reason = "dependency_vulnerability_detected" if vulnerable else "ok"
          now = datetime.now(timezone.utc)
          week_key = f"{now.isocalendar().year}W{now.isocalendar().week:02d}"
          alert_key = f"dependency-{severity}-{reason}-{week_key}"
          state_signature = f"reason={reason}|severity={severity}|packages={len(vulnerable)}|advisories={total_advisories}"

          with open(output_path, "a", encoding="utf-8") as out:
            out.write(f"has_findings={'true' if vulnerable else 'false'}\n")
            out.write(f"count={len(vulnerable)}\n")
            out.write(f"advisories={total_advisories}\n")
            out.write(f"severity={severity}\n")
            out.write(f"reason={reason}\n")
            out.write(f"alert_key={alert_key}\n")
            out.write(f"state_signature={state_signature}\n")

          with open(summary_path, "a", encoding="utf-8") as f:
            f.write("## Weekly Dependency Audit\n")
            f.write(f"- Severity tier: **{severity}**\n")
            f.write(f"- Vulnerable packages: **{len(vulnerable)}**\n")
            f.write(f"- Advisory count: **{total_advisories}**\n")
            if vulnerable:
              f.write("\n### Packages with advisories\n")
              for item in vulnerable[:20]:
                f.write(f"- `{item['name']}` {item['version']} ({item['count']} advisories)\n")
          PY

      - name: Escalate dependency findings
        if: steps.summarize.outputs.has_findings == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const count = `${{ steps.summarize.outputs.count }}`;
            const advisories = `${{ steps.summarize.outputs.advisories }}`;
            const severity = `${{ steps.summarize.outputs.severity }}`;
            const reason = `${{ steps.summarize.outputs.reason }}`;
            const alertKey = `${{ steps.summarize.outputs.alert_key }}`;
            const stateSignature = `${{ steps.summarize.outputs.state_signature }}`;
            const title = `[${severity}] Dependency audit findings (${count})`;
            const body = [
              "Automated dependency audit detected vulnerable packages.",
              `<!-- alert-key:${alertKey} -->`,
              "",
              `- Severity: **${severity}**`,
              `- Reason: **${reason}**`,
              `- Vulnerable package count: **${count}**`,
              `- Advisory count: **${advisories}**`,
              `- State signature: \`${stateSignature}\``,
              "- Review workflow run details and pip-audit output.",
            ].join("\n");

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "security,dependency-audit",
              per_page: 100,
            });
            const existing = issues.find((issue) => (issue.body || "").includes(`<!-- alert-key:${alertKey} -->`));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["security", "dependency-audit"],
              });
              return;
            }
            const hasSameSignature = (existing.body || "").includes(`State signature: \`${stateSignature}\``);
            if (hasSameSignature) {
              return;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              title,
              body,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Dependency audit state transition: \`${stateSignature}\``,
            });

      - name: Fail on findings
        if: steps.summarize.outputs.has_findings == 'true'
        run: exit 1
