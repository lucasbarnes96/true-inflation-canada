name: Daily Data Scrape

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: nowcast-data-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      APIFY_ENABLED: "false"
      APIFY_MODE_REASON: "scheduled_bimonthly_apify_refresh_only"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate runtime pin
        run: python -c "import sys; assert sys.version.startswith('3.11'), sys.version"

      - name: Run nowcast pipeline
        id: pipeline
        run: |
          set +e
          python3.11 process.py
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "outcome=published" >> "$GITHUB_OUTPUT"
          elif [ "$status" -eq 1 ]; then
            echo "outcome=failed_gate" >> "$GITHUB_OUTPUT"
          else
            echo "outcome=crashed" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: python3.11 -m unittest discover -s tests -p 'test_*.py'

      - name: Enforce release gate
        id: gate
        run: |
          set +e
          python3.11 scripts/check_release_gate.py
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Commit and push data changes
        if: success() && steps.pipeline.outputs.exit_code != '2'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update nowcast data: $(date -u +%Y-%m-%d)"
            git fetch origin main
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              if [ "$attempt" -eq 3 ]; then
                echo "Failed to push data update after 3 attempts."
                exit 1
              fi
              git rebase --abort || true
              sleep $((attempt * 5))
            done
          fi

      - name: Fail on pipeline crash
        if: steps.pipeline.outputs.exit_code == '2'
        run: |
          echo "Pipeline crashed (exit 2). Failing workflow."
          exit 1

      - name: Publish run summary
        if: always()
        run: |
          python - <<'PY'
          import os
          import json
          from pathlib import Path
          p = Path("data/latest.json")
          if not p.exists():
            print("No latest.json to summarize.")
            exit(0)
          data = json.loads(p.read_text())
          ok = sum(1 for s in data.get("source_health", []) if s.get("status") in {"fresh", "stale"})
          total = len(data.get("source_health", []))
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as f:
            f.write(f"## Run Summary\n")
            f.write(f"- Confidence: **{data['headline']['confidence']}**\n")
            f.write(f"- Signal quality: **{data['headline'].get('signal_quality_score', '--')}/100**\n")
            f.write(f"- Coverage ratio: **{data['headline']['coverage_ratio']}**\n")
            f.write(f"- Source success: **{ok}/{total}**\n")
            top_driver = data.get("meta", {}).get("top_driver", {})
            f.write(f"- Top driver: **{top_driver.get('category', '--')} ({top_driver.get('contribution_pct', '--')})**\n")
            blocked = data.get("release", {}).get("blocked_conditions", [])
            if blocked:
                f.write("\n### Gate Failures\n")
                for reason in blocked:
                    f.write(f"- {reason}\n")
          PY

      - name: Build readiness report
        if: always()
        id: readiness
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import date
          from pathlib import Path

          latest_path = Path("data/latest.json")
          historical_path = Path("data/historical.json")
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          output_path = Path(os.environ["GITHUB_OUTPUT"])

          if not latest_path.exists():
            with open(output_path, "a", encoding="utf-8") as out:
              out.write("escalate=true\n")
              out.write("reason=no_latest_snapshot\n")
            with open(summary_path, "a", encoding="utf-8") as f:
              f.write("\n## Readiness Report\n")
              f.write("- Readiness unavailable: latest snapshot missing.\n")
            raise SystemExit(0)

          latest = json.loads(latest_path.read_text())
          history = {}
          if historical_path.exists():
            try:
              history = json.loads(historical_path.read_text())
            except Exception:
              history = {}

          source_health = latest.get("source_health", [])
          stale_or_missing = [s for s in source_health if s.get("status") in {"stale", "missing"}]
          blocked = latest.get("release", {}).get("blocked_conditions", [])
          release_status = latest.get("release", {}).get("status")
          quality = latest.get("headline", {}).get("signal_quality_score")
          coverage = latest.get("headline", {}).get("coverage_ratio")
          confidence = latest.get("headline", {}).get("confidence")
          as_of = latest.get("as_of_date")

          live_days = 0
          if isinstance(history, dict):
            for payload in history.values():
              if not isinstance(payload, dict):
                continue
              meta = payload.get("meta", {})
              if isinstance(meta, dict) and meta.get("seeded"):
                continue
              headline = payload.get("headline", {})
              if isinstance(headline, dict) and headline.get("nowcast_yoy_pct") is not None:
                live_days += 1

          required_sources = {"statcan_cpi_csv", "statcan_gas_csv"}
          required_missing = sorted(
            source for source in required_sources
            if not any(
              row.get("source") == source and row.get("status") == "fresh"
              for row in source_health
            )
          )
          gate_failed = release_status != "published" or bool(blocked)
          severe_degradation = len(stale_or_missing) >= 5
          escalate = gate_failed or severe_degradation or bool(required_missing)
          severity = "P3"
          reason = "ok"
          if gate_failed or required_missing:
            severity = "P1"
          elif severe_degradation:
            severity = "P2"

          if gate_failed:
            reason = "gate_failed"
          elif required_missing:
            reason = "missing_core_sources"
          elif severe_degradation:
            reason = "severe_source_degradation"

          week_key = "unknown"
          if as_of:
            try:
              iso = date.fromisoformat(as_of).isocalendar()
              week_key = f"{iso.year}W{iso.week:02d}"
            except Exception:
              week_key = "unknown"
          alert_key = f"readiness-{severity}-{reason}-{week_key}"
          state_signature = (
            f"status={release_status}|reason={reason}|severity={severity}|"
            f"degraded={len(stale_or_missing)}|required={','.join(required_missing) or 'none'}"
          )

          with open(output_path, "a", encoding="utf-8") as out:
            out.write(f"escalate={'true' if escalate else 'false'}\n")
            out.write(f"reason={reason}\n")
            out.write(f"severity={severity}\n")
            out.write(f"alert_key={alert_key}\n")
            out.write(f"state_signature={state_signature}\n")
            out.write(f"as_of={as_of}\n")
            out.write(f"live_days={live_days}\n")
            out.write(f"quality={quality}\n")
            out.write(f"coverage={coverage}\n")
            out.write(f"confidence={confidence}\n")
            out.write(f"degraded_sources={len(stale_or_missing)}\n")
            out.write(f"required_missing={','.join(required_missing)}\n")

          with open(summary_path, "a", encoding="utf-8") as f:
            f.write("\n## Readiness Report\n")
            f.write(f"- As of: **{as_of}**\n")
            f.write(f"- Release status: **{release_status}**\n")
            f.write(f"- Severity tier: **{severity}**\n")
            f.write(f"- Confidence: **{confidence}**\n")
            f.write(f"- Signal quality: **{quality}/100**\n")
            f.write(f"- Coverage ratio: **{coverage}**\n")
            f.write(f"- Live nowcast days: **{live_days}**\n")
            f.write(f"- Degraded sources (stale/missing): **{len(stale_or_missing)}**\n")
            if required_missing:
              f.write(f"- Missing core sources: **{', '.join(required_missing)}**\n")
            if blocked:
              f.write("- Blocked conditions:\n")
              for item in blocked:
                f.write(f"  - {item}\n")
          PY

      - name: Escalate readiness failures
        if: always() && steps.readiness.outputs.escalate == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const severity = `${{ steps.readiness.outputs.severity }}`;
            const reason = `${{ steps.readiness.outputs.reason }}`;
            const alertKey = `${{ steps.readiness.outputs.alert_key }}`;
            const stateSignature = `${{ steps.readiness.outputs.state_signature }}`;
            const asOf = `${{ steps.readiness.outputs.as_of }}`;
            const liveDays = `${{ steps.readiness.outputs.live_days }}`;
            const quality = `${{ steps.readiness.outputs.quality }}`;
            const coverage = `${{ steps.readiness.outputs.coverage }}`;
            const confidence = `${{ steps.readiness.outputs.confidence }}`;
            const degraded = `${{ steps.readiness.outputs.degraded_sources }}`;
            const requiredMissing = `${{ steps.readiness.outputs.required_missing }}`;
            const title = `[${severity}] Readiness Alert (${reason})`;
            const body = [
              "Automated readiness escalation from daily scrape workflow.",
              `<!-- alert-key:${alertKey} -->`,
              "",
              `- Severity: **${severity}**`,
              `- Reason: **${reason}**`,
              `- As of: **${asOf}**`,
              `- Confidence: **${confidence}**`,
              `- Signal quality: **${quality}/100**`,
              `- Coverage ratio: **${coverage}**`,
              `- Live days: **${liveDays}**`,
              `- Degraded sources: **${degraded}**`,
              `- Missing core sources: **${requiredMissing || "none"}**`,
              `- State signature: \`${stateSignature}\``,
            ].join("\n");
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ops,readiness-alert",
              per_page: 100,
            });
            const existing = issues.find((issue) => (issue.body || "").includes(`<!-- alert-key:${alertKey} -->`));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["ops", "readiness-alert"],
              });
              return;
            }
            const hasSameSignature = (existing.body || "").includes(`State signature: \`${stateSignature}\``);
            if (hasSameSignature) {
              return;
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              title,
              body,
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `State transition detected on ${asOf}: \`${stateSignature}\``,
            });
