<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Inflation Rates | True Inflation Canada</title>
    <meta name="description"
        content="View historical Year-over-Year (YoY) percent changes for various monetary aggregates compared to official Canadian CPI.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://trueinflation.ca/rates">
    <meta property="og:title" content="Historical Inflation Rates | True Inflation Canada">
    <meta property="og:description"
        content="View historical Year-over-Year (YoY) percent changes for various monetary aggregates compared to official Canadian CPI.">
    <meta property="og:image" content="https://trueinflation.ca/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://trueinflation.ca/rates">
    <meta property="twitter:title" content="Historical Inflation Rates | True Inflation Canada">
    <meta property="twitter:description"
        content="View historical Year-over-Year (YoY) percent changes for various monetary aggregates compared to official Canadian CPI.">
    <meta property="twitter:image" content="https://trueinflation.ca/logo.png">

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --border: #27272a;
            --accent: #3b82f6;
            --radius: 12px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            display: inline-block;
        }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .canvas-wrapper {
            height: 400px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Dashboard</a>
        <h1>Historical Inflation Rates</h1>
        <p>Year-over-Year (YoY) percent change for various monetary aggregates compared to official CPI.</p>

        <div class="chart-card">
            <div class="canvas-wrapper">
                <canvas id="ratesChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        async function loadRates() {
            const res = await fetch('data/chart_data.json');
            const data = await res.json();

            const datasets = [];
            const colors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7'];
            let i = 0;
            let commonLabels = [];

            for (const [name, adj] of Object.entries(data.adjusters)) {
                // Calculate YoY %
                const yoy = [];
                for (let j = 12; j < adj.values.length; j++) {
                    const current = adj.values[j];
                    const prevYear = adj.values[j - 12];
                    yoy.push(((current / prevYear) - 1) * 100);
                }
                const labelSlice = adj.dates.slice(12);
                if (labelSlice.length > commonLabels.length) commonLabels = labelSlice;

                datasets.push({
                    label: `${name} YoY %`,
                    data: yoy,
                    borderColor: colors[i % colors.length],
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0
                });
                i++;
            }

            const ctx = document.getElementById('ratesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: commonLabels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            ticks: { callback: value => value + '%' }
                        }
                    },
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#fafafa' } }
                    }
                }
            });
        }
        loadRates();
    </script>
</body>

</html>
